name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: comunidade-ai-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: comunidade-ai-backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run test:e2e
      - run: npm run test:cov
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: comunidade-ai-backend/coverage

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: comunidade-online-mvp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: comunidade-online-mvp/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  playwright:
    runs-on: ubuntu-latest
    needs: [frontend]
    defaults:
      run:
        working-directory: comunidade-online-mvp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: comunidade-online-mvp/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: comunidade-online-mvp/playwright-report
